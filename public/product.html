<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chi tiết sản phẩm - Fruit Shop</title>
<link rel="stylesheet" href="style.css">
<style>
/* === PRODUCT DETAIL === */
.product-detail {
  display: flex;
  flex-wrap: wrap;
  background: white;
  margin: 20px;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  gap: 20px;
}

.product-images {
  flex: 1 1 300px;
  max-width: 400px;
  width: 100%;
}

.product-images img#mainImage {
  width: 100%;
  max-height: 350px;
  height: auto;
  object-fit: contain;
  border-radius: 12px;
  display: block;
  margin-bottom: 10px;
}

.thumbs {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  max-width: 100%;
  padding-bottom: 5px;
}

.thumbs img {
  width: 60px;
  height: 60px;
  border-radius: 6px;
  object-fit: cover;
  cursor: pointer;
  border: 2px solid transparent;
  flex: 0 0 auto;
}

.thumbs img.selected { border-color: #145b1e; }

.product-info {
  flex: 1 1 300px;
}

.product-info h1 { margin-top:0; }
.product-info p { margin:8px 0; line-height:1.5; color:#333; }
.product-info .price { font-size:20px; font-weight:bold; color:#145b1e; margin:12px 0; }
.product-info button { padding:10px 20px; background:#145b1e; color:white; border:none; border-radius:6px; cursor:pointer; font-size:16px; }
.product-info button:hover { background:#145b1e; }

/* ADMIN EDIT */
#adminEdit {
  background:#f9f9f9;
  padding:15px;
  margin:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  display:none;
}

#adminThumbs {
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:5px 0;
  border-radius:6px;
}

#adminThumbs img {
  width:60px;
  height:60px;
  object-fit:cover;
  cursor:pointer;
  border:2px solid transparent;
  flex:0 0 auto;
  border-radius:6px;
}

#adminThumbs img.selected { border-color:#145b1e; }

/* ALERT ADD TO CART */
#cartAlert {
  position:fixed;
  top:20px;
  right:20px;
  background:#145b1e;
  color:white;
  padding:10px 20px;
  border-radius:8px;
  display:none;
  z-index:1000;
}

/* POPUP LOGIN */
#authPopup{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  width:300px;
  z-index:1000;
}
#authPopup h3{ text-align:center; margin-bottom:15px; color:#2e7d32; }
#authPopup input{ width:100%; padding:8px; margin:8px 0; border-radius:8px; border:1px solid #ccc; }
#authPopup button{ width:48%; padding:8px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
#authPopup button:first-child{ background:#2e7d32; color:white; margin-right:4%; }
#authPopup button:last-child{ background:#999; color:white; }

/* RESPONSIVE */
@media (max-width:768px){
  .product-detail { flex-direction: column; }
  .product-images { max-width: 100%; margin-right: 0; }
  .product-images img#mainImage { max-height: 300px; }
}
</style>
</head>
<body>

<!-- POPUP LOGIN -->
<div id="authPopup">
  <h3>Admin Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtnPopup">Login</button>
  <button onclick="closePopup()">Close</button>
</div>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <a href="index.html">
      <img src="/logo.png" class="logo" alt="Fruit Shop">
    </a>
    <input type="text" id="searchInput" placeholder="Tìm sản phẩm...">
    <div id="searchResults"></div>
  </div>
  <div class="header-right">
    
    <a href="cart.html" class="cart">🛒 Giỏ (<span id="cartCount">0</span>)</a>
  </div>
  
</header>

<!-- BREADCRUMB -->
<div class="breadcrumb">
  <a href="index.html">Trang chủ</a> &gt; <span id="breadcrumbProduct">...</span>
</div>

<!-- PRODUCT DETAIL -->
<div class="product-detail">
  <div class="product-images">
    <img id="mainImage" src="" alt="Ảnh sản phẩm">
    <div class="thumbs" id="thumbContainer"></div>
  </div>
  <div class="product-info">
    <h1 id="productName">...</h1>
    <p class="price" id="productPrice">...</p>
    <p id="productUnit">...</p>
    <p id="productDesc">...</p>
  
    <!-- SỐ LƯỢNG VÀ TỔNG TIỀN -->
    <div class="cart-qty">
      <button id="qtyMinus">-</button>
      <input type="number" id="qtyInput" value="1" min="1">
      <button id="qtyPlus">+</button>
    </div>
    <p>Tổng: <span id="totalPrice">...</span></p>
  
    <button id="addToCartBtn">🛒 Thêm vào giỏ</button>
  </div>

<!-- ADMIN EDIT -->
<div id="adminEdit">
  <h3>Chỉnh sửa sản phẩm (Admin)</h3>
  <textarea id="editDesc" placeholder="Mô tả sản phẩm..."></textarea>
  <button id="saveBtn">💾 Lưu mô tả</button>
  <hr>
  <h4>Upload ảnh phụ</h4>
  <input type="file" id="uploadThumb">
  <button id="saveThumbBtn">💾 Thêm ảnh</button>
  <div id="adminThumbs"></div>
</div>

<!-- ALERT -->
<div id="cartAlert">Đã thêm vào giỏ hàng!</div>

<!-- FOOTER -->


<script>
const productId = new URLSearchParams(window.location.search).get("id");
let userRole = localStorage.getItem("userRole") || null;
let productPrice = 0;

// CART
function getCart(){ return JSON.parse(localStorage.getItem("cart")||"[]"); }
function saveCart(cart){ localStorage.setItem("cart", JSON.stringify(cart)); updateCartCount(); }
function updateCartCount(){ document.getElementById("cartCount").innerText = getCart().reduce((sum,p)=>sum+p.qty,0); }
updateCartCount();

// THUMBNAIL
function setSelectedThumb(selected){
  document.querySelectorAll("#thumbContainer img, #adminThumbs img").forEach(i=>i.classList.remove("selected"));
  selected.classList.add("selected");
  selected.scrollIntoView({behavior:"smooth", inline:"center"});
}
function createThumb(url, container){
  const img = document.createElement("img");
  img.src=url;
  img.addEventListener("click",()=>{ document.getElementById("mainImage").src=url; setSelectedThumb(img); });
  container.appendChild(img);
  return img;
}
function loadThumbs(product){
  const container = document.getElementById("thumbContainer");
  container.innerHTML="";
  if(product.thumbs && product.thumbs.length) product.thumbs.forEach(url=>createThumb(url,container));
}
function loadAdminThumbs(product){
  const container = document.getElementById("adminThumbs");
  container.innerHTML="";
  if(product.thumbs && product.thumbs.length){
    product.thumbs.forEach((url,index)=>{
      const wrapper=document.createElement("div");
      const img=document.createElement("img"); img.src=url;
      img.addEventListener("click",()=>{ document.getElementById("mainImage").src=url; setSelectedThumb(img); });
      const delBtn=document.createElement("button"); delBtn.innerText="×"; delBtn.addEventListener("click", async e=>{
        e.stopPropagation();
        if(!confirm("Xác nhận xoá ảnh này?")) return;
        const res = await fetch(`/api/fruits/${productId}/thumb/${index}`,{method:"DELETE"});
        const data = await res.json();
        if(data.success){ loadThumbs(data.product); loadAdminThumbs(data.product); if(data.product.thumbs.length>0) document.getElementById("mainImage").src=data.product.thumbs[0]; }
      });
      wrapper.appendChild(img); wrapper.appendChild(delBtn);
      container.appendChild(wrapper);
    });
  }
}

// QUANTITY + / -
const qtyInput = document.getElementById("qtyInput");
document.getElementById("qtyPlus").addEventListener("click",()=>{ qtyInput.value=Number(qtyInput.value)+1; updateTotalPrice(); });
document.getElementById("qtyMinus").addEventListener("click",()=>{ if(Number(qtyInput.value)>1){ qtyInput.value=Number(qtyInput.value)-1; updateTotalPrice(); }});
qtyInput.addEventListener("input",()=>{ if(qtyInput.value<1) qtyInput.value=1; updateTotalPrice(); });

// TỔNG TIỀN
function updateTotalPrice(){ document.getElementById("totalPrice").innerText=(productPrice*Number(qtyInput.value)).toLocaleString()+" VND"; }

// LOAD PRODUCT
async function loadProduct(){
  const res = await fetch(`/api/fruits/product/${productId}`);
  const p = await res.json();
  if(p.error){ alert("Không tìm thấy sản phẩm"); return; }

  productPrice = Number(p.price);
  document.getElementById("mainImage").src = p.image;
  document.getElementById("productName").innerText = p.name;
  document.getElementById("productPrice").innerText = productPrice.toLocaleString()+" VND";
  document.getElementById("productUnit").innerText = "Đơn vị: "+p.unit;
  document.getElementById("productDesc").innerText = p.description||"Chưa có mô tả sản phẩm";
  document.getElementById("breadcrumbProduct").innerText = p.name;

  loadThumbs(p);
  if(userRole==="admin"){
    document.getElementById("adminEdit").style.display="block";
    document.getElementById("editDesc").value=p.description||"";
    loadAdminThumbs(p);
  }

  updateTotalPrice();
}
loadProduct();

// ADD TO CART
document.getElementById("addToCartBtn").addEventListener("click", async ()=>{
  const res = await fetch(`/api/fruits/product/${productId}`);
  const p = await res.json();
  if(p.error){ alert("Sản phẩm không tồn tại!"); return; }
  const cart = getCart();
  const qty = Number(qtyInput.value);
  const idx = cart.findIndex(i=>i.id===p._id);
  if(idx>=0) cart[idx].qty+=qty; else cart.push({id:p._id,name:p.name,price:p.price,image:p.image,qty});
  saveCart(cart);
  const alertBox=document.getElementById("cartAlert"); alertBox.style.display="block";
  setTimeout(()=>alertBox.style.display="none",1500);
});

// ADMIN EDIT DESCRIPTION
document.getElementById("saveBtn").addEventListener("click", async ()=>{
  const desc=document.getElementById("editDesc").value;
  const username=localStorage.getItem("username");
  if(!username){ alert("Bạn chưa login!"); return; }
  const res=await fetch(`/api/fruits/${productId}/description`,{
    method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify({description:desc,username})
  });
  const data=await res.json();
  if(data.success){ alert("Cập nhật thành công!"); document.getElementById("productDesc").innerText=desc; }
});

// ADMIN UPLOAD THUMB
document.getElementById("saveThumbBtn").addEventListener("click", async ()=>{
  const file=document.getElementById("uploadThumb").files[0];
  const username=localStorage.getItem("username");
  if(!file||!username){ alert("Chọn file và login!"); return; }
  const formData=new FormData(); formData.append("thumb",file); formData.append("username",username);
  const res=await fetch(`/api/fruits/${productId}/thumb`,{method:"POST",body:formData});
  const data=await res.json();
  if(data.success){ loadThumbs(data.product); loadAdminThumbs(data.product); if(data.product.thumbs.length>0) document.getElementById("mainImage").src=data.product.thumbs[data.product.thumbs.length-1]; }
});

// LOGIN/LOGOUT
document.getElementById("loginBtn").addEventListener("click",()=>{ document.getElementById("authPopup").style.display="block"; });
document.getElementById("logoutBtn").addEventListener("click",()=>{
  localStorage.removeItem("username"); localStorage.removeItem("userRole"); userRole=null;
  document.getElementById("loginBtn").style.display="inline-block";
  document.getElementById("logoutBtn").style.display="none";
  document.getElementById("adminEdit").style.display="none";
});
function closePopup(){ document.getElementById("authPopup").style.display="none"; }
document.getElementById("loginBtnPopup").addEventListener("click", async ()=>{
  const username=document.getElementById("username").value.trim();
  const password=document.getElementById("password").value.trim();
  if(!username||!password){ alert("Điền đầy đủ username/password"); return; }
  const res=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})});
  const data=await res.json();
  if(data.success){
    userRole=data.role;
    localStorage.setItem("username",username);
    localStorage.setItem("userRole",userRole);
    closePopup();
    document.getElementById("loginBtn").style.display="none";
    document.getElementById("logoutBtn").style.display="inline-block";
    if(userRole==="admin") document.getElementById("adminEdit").style.display="block";
  } else alert(data.message||"Login thất bại");
});
</script>
</body>
</html>
