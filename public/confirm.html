<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Xác Nhận Đơn Hàng</title>
<style>
  /* BODY */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 0;
  }

  /* CONTAINER */
  .container {
    max-width: 600px;
    margin: 60px auto;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    padding: 30px 25px;
    text-align: center;
    animation: fadeIn 0.5s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px);}
    to { opacity: 1; transform: translateY(0);}
  }

  h1 {
    color: #145b1e;
    font-size: 28px;
    margin-bottom: 15px;
  }

  .check-icon {
    font-size: 50px;
    color: #145b1e;
    margin-bottom: 15px;
  }

  p {
    font-size: 16px;
    color: #333;
    line-height: 1.5;
    white-space: pre-line;
  }

  .btn-home {
    display: inline-block;
    margin-top: 25px;
    padding: 12px 25px;
    background: #145b1e;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    transition: background 0.3s;
  }

  .btn-home:hover {
    background: #0d4014;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="check-icon">✅</div>
    <h1>Đơn hàng đã được xác nhận!</h1>
    <p id="order-info"></p>
    <a href="index.html" class="btn-home">← Quay về trang chủ</a>
  </div>

  <script>
    const order = JSON.parse(localStorage.getItem("lastOrder"))
    if(order){
      document.getElementById("order-info").innerText = 
        `Cảm ơn ${order.name}!\n\nTổng đơn hàng: ${Number(order.total).toLocaleString()} VND\nChúng tôi sẽ liên hệ bạn sớm.`
      // Xóa tạm để không hiển thị lại lần sau
      localStorage.removeItem("lastOrder")
    } else {
      document.getElementById("order-info").innerText = "Không có thông tin đơn hàng."
    }
  </script>
</body>
</html>
