<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Fruit Banner</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #ffffff;
    }

    .container {
      width: 1200px;
      margin: 40px auto;
    }

    .banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f5f5f5;
      padding: 60px;
      border-radius: 12px;
    }

    .text {
      width: 50%;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 1.2px;
      line-height: 1.25;
      color: #2E7D32;
      margin-bottom: 12px;
    }

    h1 span {
      font-weight: 600;
    }

    p {
      font-size: 16px;
      color: #555;
      margin-bottom: 24px;
    }

    .btn {
      background: #FF6F00;
      color: #fff;
      padding: 14px 30px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      background: #e65c00;
    }

    .image img {
      width: 420px;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<div class="container">
  <div class="banner">

    <div class="text">
      <h1>
        TRÁI CÂY NHẬP KHẨU <br>
        <span>Tươi Mỗi Ngày</span>
      </h1>

      <p>Giao nhanh 2h – Cam kết chất lượng</p>

      <button class="btn">MUA NGAY</button>
    </div>

    <div class="image">
      <img src="https://images.unsplash.com/photo-1574226516831-e1dff420e37a" alt="fruit">
    </div>

  </div>
</div>

</body>
</html>
